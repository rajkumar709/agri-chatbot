<!DOCTYPE html>
<html>
<head>
    <title>AI Agricultural Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background: white;
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2E7D32;
        }

        #chatbox {
            height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            align-self: flex-end;
            background: #d1f5d3;
            padding: 8px 12px;
            border-radius: 10px 12px 0 12px;
            max-width: 75%;
        }

        .bot {
            align-self: flex-start;
            background: #f1f1f1;
            padding: 8px 12px;
            border-radius: 12px 12px 12px 0;
            max-width: 75%;
        }

        input {
            width: 75%;
            padding: 8px;
        }

        button {
            padding: 8px;
            background: #2E7D32;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1B5E20;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🌾 Agri AI Chatbot</h2>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Ask about crops, fertilizer..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">Speak</button>
</div>

<script>

function sendMessage(){

let message = document.getElementById("userInput").value;
let chatBox = document.getElementById("chatbox");

fetch("/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"message="+encodeURIComponent(message)
})

.then(res=>res.text())

.then(data=>{

chatBox.innerHTML += `<div class="user">${message}</div>`;
chatBox.innerHTML += `<div class="bot">${data}</div>`;

document.getElementById("userInput").value="";

chatBox.scrollTop = chatBox.scrollHeight;

});

}

document.getElementById("userInput").addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

</script>

</body>
</html>
