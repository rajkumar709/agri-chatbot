<<!DOCTYPE html>
<html>
<head>
    <title>Agri AI Chatbot 🌱</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        #chat-container {
            width: 90%;
            max-width: 600px;
            margin: auto;
            height: 60vh;
            overflow-y: auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #22c55e;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #334155;
            text-align: left;
        }

        #input-area {
            display: flex;
            width: 90%;
            max-width: 600px;
            margin: 10px auto;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            margin-left: 5px;
        }

        #upload-section {
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>🌱 Agri AI Assistant</h1>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
</div>

<div style="text-align:center;">
    <button onclick="clearChat()">🗑 Clear Chat</button>
</div>

<!-- 🌿 IMAGE UPLOAD -->
<div id="upload-section">
    <h2>🌿 Upload Leaf Image</h2>
    <input type="file" id="leafInput">
    <br><br>
    <button onclick="uploadImage()">Detect Disease</button>
    <p id="result"></p>
</div>

<script>
// Add message
function addMessage(text, className) {
    const chat = document.getElementById("chat-container");
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
}

// Send message
function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value;

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Typing animation
    const typingMsg = addMessage("Typing...", "bot");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        typingMsg.remove();
        addMessage(data.response, "bot");
        saveChat(text, data.response);
    });
}

// Save chat
function saveChat(user, bot) {
    let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];
    chats.push({ user, bot });
    localStorage.setItem("chatHistory", JSON.stringify(chats));
}

// Load chat
function loadChat() {
    let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];

    chats.forEach(chat => {
        addMessage(chat.user, "user");
        addMessage(chat.bot, "bot");
    });
}

// Clear chat
function clearChat() {
    localStorage.removeItem("chatHistory");
    document.getElementById("chat-container").innerHTML = "";
}

// Voice input
function startVoice() {
    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-IN";

    recognition.onresult = function(event) {
        document.getElementById("userInput").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}

// Image upload
function uploadImage() {
    const fileInput = document.getElementById("leafInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    const formData = new FormData();
    formData.append("leaf", file);

    document.getElementById("result").innerText = "Analyzing...";

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.result;
    });
}

// Enter key support
document.getElementById("userInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// Load chat on start
window.onload = loadChat;

</script>

</body>
</html>
